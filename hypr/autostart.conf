# Extra autostart processes
# exec-once = uwsm-app -- my-service
exec-once = hyprpm reload -n
exec-once = sleep 1 && hyprctl dispatch focusmonitor DP-2

# Force ninja-brain bot to use x11 clipboard
# I need it for ninjabrain-bot in mcsr
# Hope it doesn't fuck with my other copying
exec-once = ~/Documents/scripts/mc-clipboard-bridge.sh

exec-once = sudo systemctl enable keyd --now
exec-once = keyd-application-mapper -d
